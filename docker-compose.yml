version: "3.8"

services:

  hrms-api:
    build: .
    ports:
      - "5001:5001"
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hrms
    ports:
      - "3307:3306"

  redis:
    image: redis
    ports:
      - "6379:6379"